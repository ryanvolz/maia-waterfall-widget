[workspace]
authors = ["Ryan Volz <rvolz@mit.edu>"]
channels = ["https://prefix.dev/conda-forge"]
name = "maia_waterfall_widget"
platforms = ["linux-64"]
version = "0.1.0"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[pypi-dependencies]
maia_waterfall_widget = { path = ".", editable = true }

[dependencies]
nodejs = ">=25.7.0,<25.8"
rust = ">=1.94.0,<1.95"
wasm-pack = ">=0.14.0,<0.15"
rust-std-wasm32-unknown-unknown = ">=1.94.0,<2"
numpy = ">=2.4.3,<3"
anywidget = ">=0.9.21,<0.10"

[tasks]

[feature.dev.dependencies]
watchfiles = ">=1.1.1,<2"
jupyterlab = ">=4.5.6,<5"
pillow = ">=12.1.1,<13"
paho-mqtt = ">=2.1.0,<3"
python-build = ">=1.4.2,<2"

[feature.dev.tasks]
dev-rebuild = "pixi reinstall -e dev maia_waterfall_widget"
